<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">CofCED source-weighted competitive evidence framework</title>
  <desc id="desc">A presentation-ready scientific schematic comparing the original CofCED raw-report evidence extraction flow with the proposed source-weighted support-refute competitive evidence enhancement.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .panel { fill: #ffffff; stroke: #d8dee8; stroke-width: 2.2; }
      .panel-title { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #172033; }
      .title { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 48px; font-weight: 800; fill: #121926; }
      .subtitle { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 25px; font-weight: 500; fill: #526070; }
      .box-title { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 25px; font-weight: 700; fill: #162033; }
      .box-text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 20px; font-weight: 500; fill: #4c596b; }
      .mini { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #59677a; }
      .tag { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 19px; font-weight: 700; fill: #ffffff; }
      .metric { font-family: Consolas, "Courier New", monospace; font-size: 21px; font-weight: 700; fill: #152034; }
      .box { fill: #ffffff; stroke-width: 2.4; }
      .old { stroke: #7b8798; }
      .blue { stroke: #3979d7; }
      .green { stroke: #15966b; }
      .red { stroke: #d85845; }
      .amber { stroke: #d79621; }
      .purple { stroke: #7a5ac8; }
      .shadow { filter: url(#shadow); }
      .arrow { fill: none; stroke: #7d8a9c; stroke-width: 3.4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .arrow-blue { fill: none; stroke: #3979d7; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowBlue); }
      .arrow-green { fill: none; stroke: #15966b; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowGreen); }
      .arrow-red { fill: none; stroke: #d85845; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowRed); }
      .thin { fill: none; stroke: #b7c0cc; stroke-width: 2; stroke-dasharray: 8 8; }
    </style>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#152033" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7d8a9c"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3979d7"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#15966b"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d85845"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1920" height="1080"/>
  <text class="title" x="96" y="82">CofCED 来源加权竞争证据增强框架</text>
  <text class="subtitle" x="98" y="126">从“抽取相关证据”升级为“比较可信的支持/反驳证据”</text>

  <rect class="panel shadow" x="80" y="176" width="620" height="708" rx="18"/>
  <text class="panel-title" x="122" y="230">改动前：原始 CofCED</text>
  <text class="subtitle" x="122" y="266">raw reports → evidence extraction → label</text>

  <rect class="box old shadow" x="150" y="316" width="480" height="92" rx="12"/>
  <text class="box-title" x="190" y="354">Claim</text>
  <text class="box-text" x="190" y="384">待验证声明</text>

  <path class="arrow" d="M390 410 L390 464"/>
  <rect class="box old shadow" x="150" y="466" width="480" height="106" rx="12"/>
  <text class="box-title" x="190" y="507">Raw Reports</text>
  <text class="box-text" x="190" y="538">群众来源报道 / 网页句子</text>

  <path class="arrow" d="M390 574 L390 628"/>
  <rect class="box old shadow" x="150" y="630" width="480" height="118" rx="12"/>
  <text class="box-title" x="190" y="674">CofCED 证据蒸馏</text>
  <text class="box-text" x="190" y="706">粗粒度报告筛选 + 细粒度句子抽取</text>

  <path class="arrow" d="M390 750 L390 804"/>
  <rect class="box old shadow" x="150" y="806" width="480" height="88" rx="12"/>
  <text class="box-title" x="190" y="841">真实性预测</text>
  <text class="box-text" x="190" y="872">Label + selected evidence</text>

  <rect class="panel shadow" x="780" y="176" width="1060" height="708" rx="18"/>
  <text class="panel-title" x="822" y="230">改动后：Source-Weighted Competitive Evidence</text>
  <text class="subtitle" x="822" y="266">检索、来源可信度、立场识别和竞争池化形成可解释特征</text>

  <rect class="box blue shadow" x="842" y="316" width="252" height="100" rx="12"/>
  <text class="box-title" x="880" y="357">候选证据检索</text>
  <text class="box-text" x="880" y="389">TF-IDF relevance</text>

  <path class="arrow-blue" d="M1096 366 L1168 366"/>
  <rect class="box green shadow" x="1172" y="316" width="252" height="100" rx="12"/>
  <text class="box-title" x="1206" y="357">来源可信度评分</text>
  <text class="box-text" x="1206" y="389">domain reliability</text>

  <path class="arrow-blue" d="M1426 366 L1498 366"/>
  <rect class="box purple shadow" x="1502" y="316" width="252" height="100" rx="12"/>
  <text class="box-title" x="1540" y="357">立场识别</text>
  <text class="box-text" x="1540" y="389">support / refute / neutral</text>

  <path class="arrow-green" d="M1628 418 L1628 492"/>
  <path class="arrow-green" d="M1628 492 L1012 492 L1012 534"/>
  <path class="arrow-green" d="M1628 492 L1298 492 L1298 534"/>
  <path class="arrow-green" d="M1628 492 L1584 492 L1584 534"/>

  <rect class="box green shadow" x="872" y="536" width="280" height="126" rx="14"/>
  <rect x="898" y="562" width="92" height="30" rx="15" fill="#15966b"/>
  <text class="tag" x="918" y="584">Support</text>
  <text class="box-title" x="898" y="622">支持证据池</text>
  <text class="box-text" x="898" y="650">可信来源中的支持性句子</text>

  <rect class="box red shadow" x="1158" y="536" width="280" height="126" rx="14"/>
  <rect x="1184" y="562" width="82" height="30" rx="15" fill="#d85845"/>
  <text class="tag" x="1204" y="584">Refute</text>
  <text class="box-title" x="1184" y="622">反驳证据池</text>
  <text class="box-text" x="1184" y="650">可信来源中的反驳性句子</text>

  <rect class="box amber shadow" x="1444" y="536" width="280" height="126" rx="14"/>
  <rect x="1470" y="562" width="94" height="30" rx="15" fill="#d79621"/>
  <text class="tag" x="1490" y="584">Neutral</text>
  <text class="box-title" x="1470" y="622">中性证据池</text>
  <text class="box-text" x="1470" y="650">相关但非决定性句子</text>

  <path class="arrow-green" d="M1012 664 L1012 728 L1258 728"/>
  <path class="arrow-red" d="M1298 664 L1298 712"/>
  <path class="arrow" d="M1584 664 L1584 728 L1338 728"/>

  <rect class="box purple shadow" x="1044" y="708" width="450" height="126" rx="16"/>
  <text class="box-title" x="1082" y="750">竞争证据池化</text>
  <text class="metric" x="1082" y="786">support_strength, refute_strength</text>
  <text class="metric" x="1082" y="816">conflict_score, margin_score</text>

  <path class="arrow-blue" d="M1496 770 L1582 770"/>
  <rect class="box blue shadow" x="1586" y="708" width="178" height="126" rx="16"/>
  <text class="box-title" x="1622" y="750">输出</text>
  <text class="box-text" x="1622" y="782">JSON 特征</text>
  <text class="box-text" x="1622" y="812">证据解释</text>

  <path class="thin" d="M700 530 C750 530 742 366 840 366"/>
  <rect x="696" y="494" width="120" height="42" rx="21" fill="#e8eef8" stroke="#c4cedd"/>
  <text class="mini" x="722" y="521">新增模块</text>

  <rect x="110" y="936" width="1700" height="70" rx="16" fill="#eef5f2" stroke="#c6ded5" stroke-width="2"/>
  <text class="box-title" x="146" y="979">核心改进：</text>
  <text class="box-text" x="266" y="979">用来源可信度 × 相关性 × 立场置信度计算证据权重，并显式比较支持与反驳两侧证据强度。</text>
</svg>
