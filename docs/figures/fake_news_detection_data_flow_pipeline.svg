<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Fake news detection data-flow pipeline</title>
  <desc id="desc">A thesis-defense style data-flow pipeline showing training and inference for source-weighted competitive evidence enhanced CofCED fake news detection.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .title { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 48px; font-weight: 800; fill: #132033; }
      .subtitle { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 24px; font-weight: 500; fill: #546477; }
      .lane-title { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 31px; font-weight: 800; fill: #ffffff; }
      .box-title { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 23px; font-weight: 800; fill: #17243a; }
      .box-text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #536174; }
      .small { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 17px; font-weight: 600; fill: #58677a; }
      .code { font-family: Consolas, "Courier New", monospace; font-size: 18px; font-weight: 700; fill: #1f334d; }
      .panel { fill: #ffffff; stroke: #d8e0eb; stroke-width: 2; }
      .box { fill: #ffffff; stroke-width: 2.3; }
      .blue { stroke: #2e75c9; }
      .green { stroke: #15956b; }
      .teal { stroke: #1497a5; }
      .amber { stroke: #d69722; }
      .red { stroke: #d95b4f; }
      .purple { stroke: #7357c6; }
      .shadow { filter: url(#shadow); }
      .arrow { fill: none; stroke: #718197; stroke-width: 3.4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .arrow-blue { fill: none; stroke: #2e75c9; stroke-width: 3.7; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowBlue); }
      .arrow-green { fill: none; stroke: #15956b; stroke-width: 3.7; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowGreen); }
      .arrow-red { fill: none; stroke: #d95b4f; stroke-width: 3.7; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowRed); }
      .dash { fill: none; stroke: #aeb9c8; stroke-width: 2.2; stroke-dasharray: 8 8; }
    </style>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#152033" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#718197"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#2e75c9"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#15956b"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#d95b4f"/>
    </marker>
  </defs>

  <rect class="bg" width="1920" height="1080"/>
  <text class="title" x="88" y="78">假新闻检测数据流通 Pipeline</text>
  <text class="subtitle" x="90" y="120">Source-Weighted Competitive Evidence + CofCED 六分类标签输出</text>

  <rect class="panel shadow" x="72" y="164" width="1776" height="382" rx="18"/>
  <rect x="72" y="164" width="1776" height="72" rx="18" fill="#2e75c9"/>
  <text class="lane-title" x="112" y="211">训练阶段：从带标签数据中学习“文本语义 + 竞争证据”的判断规则</text>

  <rect class="box blue shadow" x="110" y="284" width="210" height="112" rx="13"/>
  <text class="box-title" x="135" y="324">LIAR-RAW</text>
  <text class="box-text" x="135" y="354">Claim + Reports</text>
  <text class="box-text" x="135" y="382">Gold Label</text>

  <path class="arrow-blue" d="M322 340 L386 340"/>
  <rect class="box teal shadow" x="390" y="284" width="220" height="112" rx="13"/>
  <text class="box-title" x="416" y="324">证据句抽取</text>
  <text class="box-text" x="416" y="354">候选 sentence</text>
  <text class="box-text" x="416" y="382">去重 + Top-K</text>

  <path class="arrow-blue" d="M612 340 L676 340"/>
  <rect class="box green shadow" x="680" y="284" width="220" height="112" rx="13"/>
  <text class="box-title" x="704" y="324">证据评分</text>
  <text class="box-text" x="704" y="354">相关性 relevance</text>
  <text class="box-text" x="704" y="382">来源可信度 source</text>

  <path class="arrow-blue" d="M902 340 L966 340"/>
  <rect class="box purple shadow" x="970" y="284" width="230" height="112" rx="13"/>
  <text class="box-title" x="995" y="324">立场判断</text>
  <text class="box-text" x="995" y="354">Support / Refute</text>
  <text class="box-text" x="995" y="382">Neutral</text>

  <path class="arrow-blue" d="M1202 340 L1266 340"/>
  <rect class="box amber shadow" x="1270" y="284" width="230" height="112" rx="13"/>
  <text class="box-title" x="1295" y="324">竞争证据池化</text>
  <text class="box-text" x="1295" y="354">支持强度 vs 反驳强度</text>
  <text class="box-text" x="1295" y="382">冲突与边际差</text>

  <path class="arrow-blue" d="M1502 340 L1566 340"/>
  <rect class="box red shadow" x="1570" y="284" width="230" height="112" rx="13"/>
  <text class="box-title" x="1595" y="324">多任务训练</text>
  <text class="box-text" x="1595" y="354">分类 Loss</text>
  <text class="box-text" x="1595" y="382">证据 / 文档选择 Loss</text>

  <rect class="panel shadow" x="72" y="596" width="1776" height="340" rx="18"/>
  <rect x="72" y="596" width="1776" height="72" rx="18" fill="#15956b"/>
  <text class="lane-title" x="112" y="643">判断阶段：对新声明生成同构特征，并输出六分类假新闻检测标签</text>

  <rect class="box blue shadow" x="112" y="712" width="236" height="112" rx="13"/>
  <text class="box-title" x="138" y="752">新输入</text>
  <text class="box-text" x="138" y="782">New Claim</text>
  <text class="box-text" x="138" y="810">Raw Reports</text>

  <path class="arrow-green" d="M350 768 L428 768"/>
  <rect class="box green shadow" x="432" y="712" width="250" height="112" rx="13"/>
  <text class="box-title" x="458" y="752">同样的特征生成</text>
  <text class="box-text" x="458" y="782">relevance × source</text>
  <text class="box-text" x="458" y="810">stance × diversity</text>

  <path class="arrow-green" d="M684 768 L762 768"/>
  <rect class="box purple shadow" x="766" y="712" width="278" height="112" rx="13"/>
  <text class="box-title" x="792" y="752">CofCED 表示融合</text>
  <text class="box-text" x="792" y="782">DistilBERT 文本语义</text>
  <text class="box-text" x="792" y="810">+ 竞争证据特征</text>

  <path class="arrow-green" d="M1046 768 L1124 768"/>
  <rect class="box amber shadow" x="1128" y="712" width="250" height="112" rx="13"/>
  <text class="box-title" x="1154" y="752">Softmax 六分类</text>
  <text class="box-text" x="1154" y="782">6 个标签概率</text>
  <text class="box-text" x="1154" y="810">最高概率为结果</text>

  <path class="arrow-green" d="M1380 768 L1458 768"/>
  <rect class="box red shadow" x="1462" y="700" width="306" height="136" rx="13"/>
  <text class="box-title" x="1488" y="742">输出结果 JSONL</text>
  <text class="box-text" x="1488" y="774">predicted_label</text>
  <text class="box-text" x="1488" y="802">confidence + label_probs</text>
  <text class="box-text" x="1488" y="830">support/refute evidence</text>

  <rect class="box shadow" x="380" y="438" width="1130" height="76" rx="14" stroke="#9ab6d9"/>
  <text class="box-title" x="414" y="470">10 维竞争证据特征</text>
  <text class="code" x="414" y="500">support_strength, refute_strength, conflict_score, margin_score, num_support, num_refute, source scores, max weights</text>

  <path class="dash" d="M945 396 L945 438"/>
  <path class="dash" d="M945 514 L945 712"/>

  <rect x="116" y="968" width="1688" height="60" rx="16" fill="#eef5f2" stroke="#c8ded5" stroke-width="2"/>
  <text class="box-title" x="150" y="1006">核心判断逻辑：</text>
  <text class="box-text" x="302" y="1006">模型同时看“语义上像不像假新闻”和“可信证据更支持还是更反驳”，最后输出六分类标签。</text>
</svg>
